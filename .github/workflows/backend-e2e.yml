name: E2E — Hub Playwright Tests

on:
  push:
    branches: [integration/main]
  pull_request:
    branches: [integration/main]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start Hub backend
        run: |
          cd src/webui && python hub_start.py &
          sleep 5
        env:
          HUB_ADMIN_TOKEN: ""
          SETTINGS_URL: "http://localhost:8082"
          RUNTIME_URL: "http://localhost:8081"

      - name: Start settings_canonical
        run: |
          cd src/runtime && python -m uvicorn settings_canonical:app --host 0.0.0.0 --port 8082 &
          sleep 3

      - name: Run Playwright tests
        run: npx playwright test --reporter=html
        env:
          BASE_URL: "http://localhost:8095"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
