<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub v2 — Control Plane</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #3b82f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #nav {
      width: 180px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 0;
    }

    #nav-header {
      padding: 10px 14px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .nav-section {
      padding: 4px 14px;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      border-left: 3px solid transparent;
      transition: all .15s;
    }

    .nav-item:hover {
      color: var(--text);
      background: #ffffff08;
    }

    .nav-item.active {
      color: var(--text);
      background: #3b82f610;
      border-left-color: var(--accent);
    }

    #main {
      flex: 1;
      overflow-y: auto;
    }

    .panel-host {
      display: none;
    }

    .panel-host.active {
      display: block;
    }

    .hub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
    }

    .hub-card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 2px;
    }

    .hub-btn {
      background: #1f2937;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
    }

    .hub-btn:hover {
      background: #374151;
    }

    .hub-btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .hub-btn-primary {
      background: #1d4ed8;
      border-color: #3b82f6;
    }

    .hub-btn-primary:hover {
      background: #2563eb;
    }

    .hub-btn-warn {
      background: #92400e;
      border-color: #f59e0b;
    }

    .hub-btn-warn:hover {
      background: #b45309;
    }

    code {
      font-family: monospace;
      font-size: 11px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 3px 12px;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      gap: 16px;
      z-index: 10;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--muted);
      z-index: 100;
    }
  </style>
</head>

<body>
  <div id="loading">Loading Hub v2…</div>
  <nav id="nav">
    <div id="nav-header">🏗 Hub v2</div>
    <div id="nav-items"></div>
  </nav>
  <main id="main" style="padding-bottom:24px"></main>
  <div id="status-bar">
    <span id="sb-status">● connecting…</span>
    <span id="sb-auth"></span>
    <span style="margin-left:auto"><a href="/docs" target="_blank">API Docs</a> · <a href="/mcp"
        target="_blank">MCP</a></span>
  </div>

  <script type="module">
    import hub from '/panels/core.js';
    window._hub_panels = {};

    const manifest = await fetch('/panels/manifest.json').then(r => r.json());
    const sections = {};

    for (const entry of manifest.panels) {
      const mod = await import(entry.url);
      const panel = mod.default;
      window._hub_panels[panel.id] = panel;
      const sec = panel.section || 'Other';
      sections[sec] = sections[sec] || [];
      sections[sec].push(panel);
      const host = document.createElement('div');
      host.className = 'panel-host';
      host.id = `panel-${panel.id}`;
      document.getElementById('main').appendChild(host);
    }

    const navItems = document.getElementById('nav-items');
    let firstId = null;
    const sectionOrder = ['Hub', 'Pipelines', 'KiloCode', 'Infrastructure', 'System'];
    const allSections = [...sectionOrder, ...Object.keys(sections).filter(s => !sectionOrder.includes(s))];

    for (const sec of allSections) {
      if (!sections[sec]) continue;
      const secEl = document.createElement('div');
      secEl.className = 'nav-section';
      secEl.textContent = sec;
      navItems.appendChild(secEl);
      const sorted = sections[sec].sort((a, b) => (a.order || 99) - (b.order || 99));
      for (const panel of sorted) {
        if (!firstId) firstId = panel.id;
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.dataset.id = panel.id;
        item.innerHTML = `<span>${panel.icon || '▪'}</span><span>${panel.label}</span>`;
        item.addEventListener('click', () => navigate(panel.id));
        navItems.appendChild(item);
      }
    }

    async function navigate(id) {
      document.querySelectorAll('.panel-host').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const host = document.getElementById(`panel-${id}`);
      if (host) {
        host.classList.add('active');
        host.innerHTML = `<div style="padding:20px;color:var(--muted)">${hub.spinner()} Loading…</div>`;
      }
      document.querySelector(`.nav-item[data-id="${id}"]`)?.classList.add('active');
      const panel = window._hub_panels[id];
      if (panel) {
        await panel.refresh();
      }
    }

    for (const [id, panel] of Object.entries(window._hub_panels)) {
      try {
        await Promise.race([
          panel.init(hub),
          new Promise((_, r) => setTimeout(() => r(new Error('init timeout')), 3000))
        ]);
      } catch (e) {
        console.error(`[hub] Panel ${id} init failed:`, e);
      }
    }

    hub.on('*', (payload, msg) => {
      document.getElementById('sb-status').textContent = `● ${msg.type}`;
      setTimeout(() => { document.getElementById('sb-status').textContent = '● live'; }, 3000);
    });

    const health = await hub.get('/health');
    document.getElementById('sb-auth').textContent = `auth: ${health.auth || '?'}`;
    document.getElementById('sb-status').textContent = '● live';
    document.getElementById('loading').remove();

    if (firstId) navigate(firstId);
  </script>
</body>

</html>
