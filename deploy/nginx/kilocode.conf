# =============================================================================
# Nginx reverse-proxy config for KiloCode / daveai.tech
# Canonical port map:
#   kilocode-webui    :8095  → /hub/
#   kilocode-runtime  :8081  → /api/runtime/
#   kilocode-settings :8082  → /api/settings/
#   kilocode-hermes   :8091  → /api/hermes/
#   open-webui        :7860  → / (default)
# =============================================================================

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

upstream kilocode_webui    { server 127.0.0.1:8095; keepalive 32; }
upstream kilocode_runtime  { server 127.0.0.1:8081; keepalive 32; }
upstream kilocode_settings { server 127.0.0.1:8082; keepalive 32; }
upstream kilocode_hermes   { server 127.0.0.1:8091; keepalive 32; }
upstream open_webui        { server 127.0.0.1:7860; keepalive 32; }
upstream lm_studio         { server 127.0.0.1:1234; keepalive 8; }
upstream ollama            { server 127.0.0.1:11434; keepalive 8; }
upstream litellm           { server 127.0.0.1:4000; keepalive 16; }

# ---------------------------------------------------------------------------
# HTTP — redirect to HTTPS (certbot inserts SSL block)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name daveai.tech www.daveai.tech hermes.daveai.tech;
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name daveai.tech www.daveai.tech;

    ssl_certificate     /etc/letsencrypt/live/daveai.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daveai.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── KiloCode Control Hub (primary) ──────────────────────────────────
    location /hub/ {
        proxy_pass         http://kilocode_webui/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Runtime API ──────────────────────────────────────────────────────
    location /api/runtime/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://kilocode_runtime/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── Settings API ─────────────────────────────────────────────────────
    location /api/settings/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://kilocode_settings/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── Hermes API ───────────────────────────────────────────────────────
    location /api/hermes/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://kilocode_hermes/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # ── Open WebUI (default root) ─────────────────────────────────────────
    location / {
        proxy_pass         http://open_webui;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}

# ---------------------------------------------------------------------------
# hermes.daveai.tech → Open WebUI
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name hermes.daveai.tech;

    ssl_certificate     /etc/letsencrypt/live/daveai.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daveai.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://open_webui;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
