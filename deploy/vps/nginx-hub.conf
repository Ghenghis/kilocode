server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index hub.html;

    location / {
        try_files $uri $uri/ /hub.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
