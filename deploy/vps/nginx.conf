upstream runtime_core    { server localhost:8000; }
upstream hermes_gateway  { server localhost:8091; }
upstream hermes1         { server localhost:8081; }
upstream hermes2         { server localhost:8082; }
upstream hermes3         { server localhost:8083; }
upstream hermes4         { server localhost:8084; }
upstream hermes5         { server localhost:8085; }
upstream litellm         { server localhost:8001; }
upstream open_webui      { server localhost:3000; }
upstream shiba           { server localhost:18789; }
upstream hub             { server localhost:8095; }

server {
    listen 80;
    server_name 187.77.30.206;

    # ── Contract Kit Control Hub (primary) ────────────────────────────────────
    location / {
        proxy_pass http://hub;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Runtime Core API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://runtime_core;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── Hermes Gateway ────────────────────────────────────────────────────────
    location /api/hermes/ {
        proxy_pass http://hermes_gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # ── Individual Hermes Agents ──────────────────────────────────────────────
    location /api/hermes1/ { proxy_pass http://hermes1/; }
    location /api/hermes2/ { proxy_pass http://hermes2/; }
    location /api/hermes3/ { proxy_pass http://hermes3/; }
    location /api/hermes4/ { proxy_pass http://hermes4/; }
    location /api/hermes5/ { proxy_pass http://hermes5/; }

    # ── Shiba Memory Gateway ──────────────────────────────────────────────────
    location /shiba/ {
        proxy_pass http://shiba/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── LiteLLM Proxy ─────────────────────────────────────────────────────────
    location /llm/ {
        proxy_pass http://litellm/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # ── Open WebUI ────────────────────────────────────────────────────────────
    location /webui/ {
        proxy_pass http://open_webui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
