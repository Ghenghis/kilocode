  <rect x="615" y="290" width="100" height="50" rx="8" fill="#1a2820" stroke="#34d399" stroke-width="1.5"/>
  <text x="665" y="312" text-anchor="middle" fill="#34d399" font-weight="bold" font-size="12">Ollama</text>
  <text x="665" y="328" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">:11434</text>

