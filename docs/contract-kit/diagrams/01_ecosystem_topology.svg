  <text x="188" y="99" text-anchor="middle" fill="#60a5fa" font-size="9">HTTP</text>

  <!-- WebUI → Runtime -->
  <line x1="400" y1="105" x2="478" y2="105" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="439" y="99" text-anchor="middle" fill="#4ade80" font-size="9">proxy</text>

  <!-- Runtime → Hermes -->
  <line x1="660" y1="105" x2="738" y2="105" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="699" y="99" text-anchor="middle" fill="#fb923c" font-size="9">tasks</text>

  <!-- Hermes → ZeroClaw -->
  <line x1="830" y1="140" x2="830" y2="178" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Hermes → Discord -->
  <line x1="830" y1="140" x2="830" y2="278" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- WebUI → KiloCode -->
  <line x1="310" y1="140" x2="310" y2="178" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Runtime → Settings -->
  <line x1="570" y1="140" x2="570" y2="178" stroke="#86efac" stroke-width="1.5" marker-end="url(#arr)"/>

