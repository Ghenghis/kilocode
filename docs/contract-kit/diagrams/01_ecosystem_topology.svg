<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI',Arial,sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="1100" height="720" fill="#0f172a"/>
  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#f8fafc">KiloCode Contract Kit v17 — Ecosystem Topology</text>
  <text x="550" y="56" text-anchor="middle" font-size="11" fill="#94a3b8">VPS 187.77.30.206 · Port Registry · All Services</text>

  <!-- ── BROWSER / USER ── -->
  <rect x="20" y="80" width="140" height="50" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="90" y="101" text-anchor="middle" fill="#f8fafc" font-weight="bold">👤 Browser</text>
  <text x="90" y="118" text-anchor="middle" fill="#94a3b8" font-size="10">User / Dashboard</text>

  <!-- ── WEBUI HUB ── -->
  <rect x="220" y="70" width="180" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="94" text-anchor="middle" fill="#60a5fa" font-weight="bold" font-size="13">WebUI Hub</text>
  <text x="310" y="110" text-anchor="middle" fill="#93c5fd" font-size="10">hub.html · dashboard.py</text>
  <text x="310" y="126" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">:8095</text>

  <!-- ── KILOCODE VSIX ── -->
  <rect x="220" y="180" width="180" height="60" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="310" y="204" text-anchor="middle" fill="#a78bfa" font-weight="bold" font-size="13">KiloCode VSIX</text>
  <text x="310" y="220" text-anchor="middle" fill="#c4b5fd" font-size="10">VS Code Extension</text>
  <text x="310" y="233" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">syncs :8081/:8082</text>

  <!-- ── RUNTIME CORE ── -->
  <rect x="480" y="70" width="180" height="70" rx="8" fill="#1f3720" stroke="#22c55e" stroke-width="2"/>
  <text x="570" y="94" text-anchor="middle" fill="#4ade80" font-weight="bold" font-size="13">Runtime Core</text>
  <text x="570" y="110" text-anchor="middle" fill="#86efac" font-size="10">core.py · EventBus</text>
  <text x="570" y="126" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">:8081</text>

