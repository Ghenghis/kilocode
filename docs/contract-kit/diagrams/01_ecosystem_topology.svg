  <text x="830" y="318" text-anchor="middle" fill="#c7d2fe" font-size="10">H1 :8200 · H2 :8201</text>
  <text x="830" y="332" text-anchor="middle" fill="#c7d2fe" font-size="10">H3 :8202 · H4 :8203</text>
  <text x="830" y="346" text-anchor="middle" fill="#c7d2fe" font-size="10">H5 :8204</text>

