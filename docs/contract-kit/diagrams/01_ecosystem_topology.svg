  <text x="80" y="470" fill="#94a3b8" font-size="10">HTTP / WebUI request</text>
  <line x1="35" y1="483" x2="70" y2="483" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-grn)"/>
  <text x="80" y="487" fill="#94a3b8" font-size="10">Proxy / API call</text>
  <line x1="35" y1="500" x2="70" y2="500" stroke="#f97316" stroke-width="2" marker-end="url(#arr)"/>
  <text x="80" y="504" fill="#94a3b8" font-size="10">Task / orchestration</text>
  <line x1="35" y1="517" x2="70" y2="517" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="80" y="521" fill="#94a3b8" font-size="10">Provider / inference route</text>
  <text x="35" y="543" fill="#94a3b8" font-size="10">Port colours match border colour of each service box.</text>

  <!-- ── PORT TABLE ── -->
  <rect x="360" y="430" width="370" height="195" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="545" y="452" text-anchor="middle" fill="#f8fafc" font-weight="bold" font-size="11">Canonical Port Registry</text>
  <text x="375" y="472" fill="#60a5fa" font-size="10">:8095</text><text x="430" y="472" fill="#94a3b8" font-size="10">WebUI Hub (hub.html / dashboard.py)</text>
  <text x="375" y="489" fill="#4ade80" font-size="10">:8081</text><text x="430" y="489" fill="#94a3b8" font-size="10">Runtime Core API (core.py)</text>
  <text x="375" y="506" fill="#86efac" font-size="10">:8082</text><text x="430" y="506" fill="#94a3b8" font-size="10">Settings Service (settings_canonical.py)</text>
  <text x="375" y="523" fill="#fb923c" font-size="10">:8091</text><text x="430" y="523" fill="#94a3b8" font-size="10">Hermes Orchestrator (orchestrator.py)</text>
  <text x="375" y="540" fill="#e879f9" font-size="10">:1234</text><text x="430" y="540" fill="#94a3b8" font-size="10">LM Studio inference server</text>
  <text x="375" y="557" fill="#34d399" font-size="10">:11434</text><text x="430" y="557" fill="#94a3b8" font-size="10">Ollama inference server</text>
  <text x="375" y="574" fill="#c084fc" font-size="10">:4000</text><text x="430" y="574" fill="#94a3b8" font-size="10">LiteLLM proxy</text>
  <text x="375" y="591" fill="#facc15" font-size="10">:18789</text><text x="430" y="591" fill="#94a3b8" font-size="10">Shiba Memory Gateway</text>
  <text x="375" y="608" fill="#a5b4fc" font-size="10">:8200-8204</text><text x="430" y="608" fill="#94a3b8" font-size="10">Hermes Discord Bots (H1–H5)</text>
</svg>
