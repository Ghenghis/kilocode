  <text x="310" y="313" text-anchor="middle" fill="#c4b5fd" font-weight="bold" font-size="12">Blockchain Audit</text>
  <text x="310" y="329" text-anchor="middle" fill="#ddd6fe" font-size="10">audit_chain · consensus</text>
  <text x="310" y="342" text-anchor="middle" fill="#c4b5fd" font-size="10">audit_agent · dashboard</text>

