  <text x="830" y="110" text-anchor="middle" fill="#fdba74" font-size="10">orchestrator.py · KOM</text>
  <text x="830" y="126" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="bold">:8091</text>

