  <text x="665" y="382" text-anchor="middle" fill="#facc15" font-weight="bold" font-size="11">Shiba Memory</text>
  <text x="665" y="398" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="bold">:18789</text>

