<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Segoe UI',Arial,sans-serif" font-size="11">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/></marker>
    <marker id="c" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#fb923c"/></marker>
    <marker id="d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f9a8d4"/></marker>
    <marker id="e" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#a5b4fc"/></marker>
  </defs>
  <rect width="1000" height="700" fill="#0f172a"/>
  <text x="500" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#f8fafc">Task + Evidence Data Flow</text>
  <text x="500" y="50" text-anchor="middle" font-size="10" fill="#94a3b8">End-to-end lifecycle: User action → Task Packet → KOM dispatch → Completion → Evidence</text>

  <!-- Step labels top -->
  <text x="80" y="78" text-anchor="middle" fill="#64748b" font-size="10">① Submit</text>
  <text x="250" y="78" text-anchor="middle" fill="#64748b" font-size="10">② Route</text>
  <text x="430" y="78" text-anchor="middle" fill="#64748b" font-size="10">③ Plan</text>
  <text x="620" y="78" text-anchor="middle" fill="#64748b" font-size="10">④ Fanout</text>
  <text x="820" y="78" text-anchor="middle" fill="#64748b" font-size="10">⑤ Execute</text>

  <!-- Swim-lane rows -->
  <!-- Lane: User/WebUI -->
  <rect x="10" y="88" width="980" height="110" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="22" y="145" fill="#60a5fa" font-weight="bold" font-size="10">WebUI</text>

  <rect x="30" y="98" width="100" height="50" rx="5" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="80" y="118" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold">User Action</text>
  <text x="80" y="133" text-anchor="middle" fill="#93c5fd" font-size="9">hub.html panel</text>

  <rect x="190" y="98" width="120" height="50" rx="5" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="250" y="118" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold">Control Packet</text>
  <text x="250" y="133" text-anchor="middle" fill="#93c5fd" font-size="9">POST /api/pipeline/events</text>

  <rect x="820" y="98" width="140" height="50" rx="5" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="890" y="118" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold">Evidence Display</text>
  <text x="890" y="133" text-anchor="middle" fill="#93c5fd" font-size="9">pane-evidence / pane-repairs</text>

  <line x1="130" y1="123" x2="188" y2="123" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="870" y1="123" x2="822" y2="123" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Lane: Runtime -->
  <rect x="10" y="208" width="980" height="110" rx="4" fill="#1f2d1e" stroke="#334155" stroke-width="1"/>
  <text x="22" y="265" fill="#4ade80" font-weight="bold" font-size="10">Runtime</text>

  <rect x="190" y="218" width="130" height="50" rx="5" fill="#1f3720" stroke="#22c55e"/>
  <text x="255" y="238" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Event Dispatch</text>
  <text x="255" y="253" text-anchor="middle" fill="#86efac" font-size="9">_PIPELINE_EVENTS store</text>

  <rect x="370" y="218" width="130" height="50" rx="5" fill="#1f3720" stroke="#22c55e"/>
  <text x="435" y="238" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Task Packet</text>
  <text x="435" y="253" text-anchor="middle" fill="#86efac" font-size="9">project_id, phase, criteria</text>

  <rect x="680" y="218" width="130" height="50" rx="5" fill="#1f3720" stroke="#22c55e"/>
  <text x="745" y="238" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Settings Canonical</text>
  <text x="745" y="253" text-anchor="middle" fill="#86efac" font-size="9">settings_canonical.py :8082</text>

  <line x1="320" y1="243" x2="368" y2="243" stroke="#4ade80" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="250" y1="218" x2="250" y2="208" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="435" y1="218" x2="435" y2="208" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Lane: Hermes + KOM -->
  <rect x="10" y="328" width="980" height="130" rx="4" fill="#2d1b1b" stroke="#334155" stroke-width="1"/>
  <text x="22" y="392" fill="#fb923c" font-weight="bold" font-size="10">Hermes</text>

  <rect x="370" y="338" width="140" height="55" rx="5" fill="#3b1f1a" stroke="#f97316"/>
  <text x="440" y="358" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="bold">KOM Intake</text>
  <text x="440" y="372" text-anchor="middle" fill="#fdba74" font-size="9">POST /api/kom/start</text>
  <text x="440" y="385" text-anchor="middle" fill="#fdba74" font-size="9">mode: codebase_audit etc.</text>

  <rect x="560" y="338" width="140" height="55" rx="5" fill="#3b1f1a" stroke="#f97316"/>
  <text x="630" y="358" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="bold">Subtask Planner</text>
  <text x="630" y="372" text-anchor="middle" fill="#fdba74" font-size="9">POST /api/kom/session</text>
  <text x="630" y="385" text-anchor="middle" fill="#fdba74" font-size="9">/dispatch → Hermes/ZC</text>

  <rect x="750" y="338" width="140" height="55" rx="5" fill="#3b1f1a" stroke="#f97316"/>
  <text x="820" y="358" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="bold">RepairRouter</text>
  <text x="820" y="372" text-anchor="middle" fill="#fdba74" font-size="9">route_repair()</text>
  <text x="820" y="385" text-anchor="middle" fill="#fdba74" font-size="9">execute_repair()</text>

  <line x1="500" y1="366" x2="558" y2="366" stroke="#fb923c" stroke-width="1.5" marker-end="url(#c)"/>
  <line x1="700" y1="366" x2="748" y2="366" stroke="#fb923c" stroke-width="1.5" marker-end="url(#c)"/>
  <line x1="435" y1="338" x2="435" y2="328" stroke="#fb923c" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Lane: ZeroClaw -->
  <rect x="10" y="468" width="980" height="110" rx="4" fill="#1c1c2d" stroke="#334155" stroke-width="1"/>
  <text x="22" y="522" fill="#f9a8d4" font-weight="bold" font-size="10">ZeroClaw</text>

  <rect x="560" y="478" width="110" height="50" rx="5" fill="#22192e" stroke="#f472b6"/>
  <text x="615" y="498" text-anchor="middle" fill="#f9a8d4" font-size="10" font-weight="bold">GitAdapter</text>
  <text x="615" y="512" text-anchor="middle" fill="#fbcfe8" font-size="9">clone/push/pull/commit</text>

  <rect x="685" y="478" width="110" height="50" rx="5" fill="#22192e" stroke="#f472b6"/>
  <text x="740" y="498" text-anchor="middle" fill="#f9a8d4" font-size="10" font-weight="bold">ShellAdapter</text>
  <text x="740" y="512" text-anchor="middle" fill="#fbcfe8" font-size="9">run / get_output</text>

  <rect x="810" y="478" width="120" height="50" rx="5" fill="#22192e" stroke="#f472b6"/>
  <text x="870" y="498" text-anchor="middle" fill="#f9a8d4" font-size="10" font-weight="bold">FilesystemAdapter</text>
  <text x="870" y="512" text-anchor="middle" fill="#fbcfe8" font-size="9">read/write/copy/move</text>

  <line x1="630" y1="478" x2="630" y2="468" stroke="#f9a8d4" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Lane: Evidence Store -->
  <rect x="10" y="588" width="980" height="80" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="22" y="628" fill="#94a3b8" font-weight="bold" font-size="10">Evidence + Audit</text>
  <rect x="190" y="600" width="130" height="45" rx="5" fill="#1e293b" stroke="#64748b"/>
  <text x="255" y="618" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">CompletionPacket</text>
  <text x="255" y="632" text-anchor="middle" fill="#64748b" font-size="9">project_id, files, tests</text>

  <rect x="370" y="600" width="130" height="45" rx="5" fill="#1e293b" stroke="#64748b"/>
  <text x="435" y="618" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">_ACTIVITY_LOG</text>
  <text x="435" y="632" text-anchor="middle" fill="#64748b" font-size="9">/api/agents/activity</text>

  <rect x="550" y="600" width="130" height="45" rx="5" fill="#1e293b" stroke="#64748b"/>
  <text x="615" y="618" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">Audit Trail</text>
  <text x="615" y="632" text-anchor="middle" fill="#64748b" font-size="9">/settings/audit ledger</text>

  <rect x="730" y="600" width="130" height="45" rx="5" fill="#1e293b" stroke="#64748b"/>
  <text x="795" y="618" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">Blockchain Audit</text>
  <text x="795" y="632" text-anchor="middle" fill="#64748b" font-size="9">audit_chain.py hash-chain</text>

  <!-- vertical connectors Runtime→Hermes -->
  <line x1="435" y1="268" x2="435" y2="328" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#c)"/>
  <!-- Hermes→ZeroClaw -->
  <line x1="630" y1="393" x2="630" y2="468" stroke="#f9a8d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#d)"/>
  <!-- ZeroClaw→Evidence -->
  <line x1="800" y1="518" x2="800" y2="588" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#e)"/>
  <!-- Evidence→WebUI (return path) -->
  <line x1="800" y1="600" x2="890" y2="150" stroke="#60a5fa" stroke-width="1" stroke-dasharray="2,3" marker-end="url(#a)"/>
</svg>
