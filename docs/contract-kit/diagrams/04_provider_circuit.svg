<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Segoe UI',Arial,sans-serif" font-size="11">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker>
    <marker id="arr-ok" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/></marker>
    <marker id="arr-fail" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/></marker>
  </defs>
  <rect width="900" height="580" fill="#0f172a"/>
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#f8fafc">Provider Circuit Breaker + Failover Chain</text>
  <text x="450" y="50" text-anchor="middle" font-size="10" fill="#94a3b8">All routes handled by dashboard.py /api/providers/* endpoints</text>

  <!-- Request -->
  <rect x="370" y="70" width="160" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="93" text-anchor="middle" fill="#60a5fa" font-weight="bold">Inference Request</text>
  <text x="450" y="108" text-anchor="middle" fill="#93c5fd" font-size="9">from Runtime / Hermes</text>

  <!-- Circuit breaker decision -->
  <polygon points="450,148 560,188 450,228 340,188" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="184" text-anchor="middle" fill="#fb923c" font-weight="bold" font-size="11">Circuit</text>
  <text x="450" y="200" text-anchor="middle" fill="#fdba74" font-size="10">OPEN?</text>

  <line x1="450" y1="120" x2="450" y2="148" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CLOSED path → provider -->
  <text x="330" y="185" fill="#22c55e" font-size="10">NO (closed)</text>
  <!-- MiniMax -->
  <rect x="30" y="260" width="130" height="60" rx="6" fill="#1f3720" stroke="#22c55e" stroke-width="2"/>
  <text x="95" y="283" text-anchor="middle" fill="#4ade80" font-weight="bold">MiniMax</text>
  <text x="95" y="297" text-anchor="middle" fill="#86efac" font-size="9">api.minimax.chat</text>
  <text x="95" y="311" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Primary</text>

  <line x1="340" y1="188" x2="160" y2="290" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-ok)"/>

  <!-- OPEN path → failover -->
  <text x="560" y="185" fill="#ef4444" font-size="10">YES (open)</text>
  <!-- Failover chain -->
  <rect x="600" y="240" width="130" height="50" rx="6" fill="#2a1010" stroke="#ef4444" stroke-width="1.5"/>
  <text x="665" y="262" text-anchor="middle" fill="#f87171" font-weight="bold">SiliconFlow</text>
  <text x="665" y="276" text-anchor="middle" fill="#fca5a5" font-size="9">api.siliconflow.cn/v1</text>
  <line x1="560" y1="188" x2="600" y2="265" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-fail)"/>

  <rect x="600" y="310" width="130" height="50" rx="6" fill="#2a2010" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="665" y="332" text-anchor="middle" fill="#fbbf24" font-weight="bold">LM Studio</text>
  <text x="665" y="346" text-anchor="middle" fill="#fde68a" font-size="9">localhost:1234</text>
  <line x1="665" y1="290" x2="665" y2="310" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="600" y="380" width="130" height="50" rx="6" fill="#101a28" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="665" y="402" text-anchor="middle" fill="#38bdf8" font-weight="bold">Ollama</text>
  <text x="665" y="416" text-anchor="middle" fill="#7dd3fc" font-size="9">localhost:11434</text>
  <line x1="665" y1="360" x2="665" y2="380" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="600" y="450" width="130" height="50" rx="6" fill="#1a0a0a" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="665" y="472" text-anchor="middle" fill="#ef4444" font-weight="bold">Offline Mode</text>
  <text x="665" y="486" text-anchor="middle" fill="#fca5a5" font-size="9">all providers down</text>
  <line x1="665" y1="430" x2="665" y2="450" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <!-- Circuit state boxes -->
  <rect x="30" y="390" width="530" height="140" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="295" y="412" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="12">Circuit Breaker States</text>

  <rect x="50" y="425" width="130" height="80" rx="5" fill="#1f3720" stroke="#22c55e"/>
  <text x="115" y="448" text-anchor="middle" fill="#4ade80" font-weight="bold">CLOSED</text>
  <text x="115" y="464" text-anchor="middle" fill="#86efac" font-size="9">Normal operation</text>
  <text x="115" y="478" text-anchor="middle" fill="#86efac" font-size="9">failures=0</text>
  <text x="115" y="492" text-anchor="middle" fill="#86efac" font-size="9">Routes to primary</text>

  <rect x="210" y="425" width="130" height="80" rx="5" fill="#2a2010" stroke="#fbbf24"/>
  <text x="275" y="448" text-anchor="middle" fill="#fbbf24" font-weight="bold">HALF-OPEN</text>
  <text x="275" y="464" text-anchor="middle" fill="#fde68a" font-size="9">Testing recovery</text>
  <text x="275" y="478" text-anchor="middle" fill="#fde68a" font-size="9">failures=1-2</text>
  <text x="275" y="492" text-anchor="middle" fill="#fde68a" font-size="9">Probe then decide</text>

  <rect x="370" y="425" width="130" height="80" rx="5" fill="#2a1010" stroke="#ef4444"/>
  <text x="435" y="448" text-anchor="middle" fill="#ef4444" font-weight="bold">OPEN</text>
  <text x="435" y="464" text-anchor="middle" fill="#fca5a5" font-size="9">Provider rejected</text>
  <text x="435" y="478" text-anchor="middle" fill="#fca5a5" font-size="9">failures≥3</text>
  <text x="435" y="492" text-anchor="middle" fill="#fca5a5" font-size="9">Routes to fallback</text>

  <!-- state arrows -->
  <path d="M 180 465 Q 195 445 208 465" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="191" y="442" text-anchor="middle" fill="#64748b" font-size="9">fail</text>
  <path d="M 340 465 Q 355 445 368 465" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="353" y="442" text-anchor="middle" fill="#64748b" font-size="9">fail</text>
  <path d="M 275 425 Q 200 400 115 425" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-ok)"/>
  <text x="190" y="398" text-anchor="middle" fill="#64748b" font-size="9">probe ok → reset</text>

  <!-- WebUI control -->
  <rect x="750" y="390" width="130" height="80" rx="6" fill="#1e293b" stroke="#3b82f6"/>
  <text x="815" y="412" text-anchor="middle" fill="#60a5fa" font-weight="bold" font-size="11">WebUI Controls</text>
  <text x="815" y="428" text-anchor="middle" fill="#93c5fd" font-size="9">POST /api/providers/</text>
  <text x="815" y="442" text-anchor="middle" fill="#93c5fd" font-size="9">{id}/reset</text>
  <text x="815" y="456" text-anchor="middle" fill="#93c5fd" font-size="9">{id}/failover</text>
  <text x="815" y="470" text-anchor="middle" fill="#93c5fd" font-size="9">Manual override</text>
</svg>
