<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI',Arial,sans-serif" font-size="11">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker>
    <marker id="arr-ok" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/></marker>
    <marker id="arr-ora" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#fb923c"/></marker>
  </defs>
  <rect width="960" height="620" fill="#0f172a"/>
  <text x="480" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#f8fafc">KiloCode Orchestrator Mode (KOM) — Session Lifecycle</text>
  <text x="480" y="50" text-anchor="middle" font-size="10" fill="#94a3b8">dashboard.py /api/kom/* · _KOM_SESSIONS in-process store</text>

  <!-- POST /api/kom/start -->
  <rect x="20" y="70" width="160" height="65" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="92" text-anchor="middle" fill="#60a5fa" font-weight="bold">POST /api/kom/start</text>
  <text x="100" y="107" text-anchor="middle" fill="#93c5fd" font-size="9">goal: string</text>
  <text x="100" y="120" text-anchor="middle" fill="#93c5fd" font-size="9">mode: codebase_audit |</text>
  <text x="100" y="133" text-anchor="middle" fill="#93c5fd" font-size="9">full_pipeline | custom</text>

  <!-- Session Created -->
  <rect x="240" y="70" width="160" height="65" rx="6" fill="#1f3720" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="92" text-anchor="middle" fill="#4ade80" font-weight="bold">Session Created</text>
  <text x="320" y="107" text-anchor="middle" fill="#86efac" font-size="9">session_id: uuid[:12]</text>
  <text x="320" y="120" text-anchor="middle" fill="#86efac" font-size="9">status: running</text>
  <text x="320" y="133" text-anchor="middle" fill="#86efac" font-size="9">subtasks: []</text>

  <!-- Subtask Planning -->
  <rect x="460" y="70" width="160" height="65" rx="6" fill="#2d1b1b" stroke="#f97316" stroke-width="2"/>
  <text x="540" y="92" text-anchor="middle" fill="#fb923c" font-weight="bold">Subtask Planning</text>
  <text x="540" y="107" text-anchor="middle" fill="#fdba74" font-size="9">type: hermes_intake</text>
  <text x="540" y="120" text-anchor="middle" fill="#fdba74" font-size="9">type: zeroclaw_git</text>
  <text x="540" y="133" text-anchor="middle" fill="#fdba74" font-size="9">type: kilocode_vsix</text>

  <!-- _KOM_SESSIONS store -->
  <rect x="680" y="70" width="260" height="65" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="810" y="92" text-anchor="middle" fill="#94a3b8" font-weight="bold">_KOM_SESSIONS store</text>
  <text x="810" y="107" text-anchor="middle" fill="#64748b" font-size="9">dict keyed by session_id</text>
  <text x="810" y="120" text-anchor="middle" fill="#64748b" font-size="9">persists until restart</text>
  <text x="810" y="133" text-anchor="middle" fill="#64748b" font-size="9">max 50 retained</text>

  <line x1="180" y1="102" x2="238" y2="102" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-ok)"/>
  <line x1="400" y1="102" x2="458" y2="102" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-ora)"/>
  <line x1="620" y1="102" x2="678" y2="102" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dispatch row -->
  <text x="480" y="170" text-anchor="middle" fill="#64748b" font-size="11" font-weight="bold">POST /api/kom/session/{id}/dispatch — routes each subtask</text>

  <!-- dispatch boxes -->
  <rect x="20" y="190" width="180" height="70" rx="6" fill="#1c1c2d" stroke="#818cf8" stroke-width="1.5"/>
  <text x="110" y="212" text-anchor="middle" fill="#a5b4fc" font-weight="bold">→ Hermes</text>
  <text x="110" y="227" text-anchor="middle" fill="#c7d2fe" font-size="9">POST /tasks (orchestrator.py)</text>
  <text x="110" y="241" text-anchor="middle" fill="#c7d2fe" font-size="9">intake → fanout → H1-H5</text>
  <text x="110" y="255" text-anchor="middle" fill="#c7d2fe" font-size="9">status: dispatched</text>

  <rect x="220" y="190" width="180" height="70" rx="6" fill="#22192e" stroke="#f472b6" stroke-width="1.5"/>
  <text x="310" y="212" text-anchor="middle" fill="#f9a8d4" font-weight="bold">→ ZeroClaw</text>
  <text x="310" y="227" text-anchor="middle" fill="#fbcfe8" font-size="9">via HermesOrchestrator</text>
  <text x="310" y="241" text-anchor="middle" fill="#fbcfe8" font-size="9">Git/Shell/FS adapter</text>
  <text x="310" y="255" text-anchor="middle" fill="#fbcfe8" font-size="9">status: dispatched</text>

  <rect x="420" y="190" width="180" height="70" rx="6" fill="#1e1a10" stroke="#facc15" stroke-width="1.5"/>
  <text x="510" y="212" text-anchor="middle" fill="#facc15" font-weight="bold">→ KiloCode VSIX</text>
  <text x="510" y="227" text-anchor="middle" fill="#fde68a" font-size="9">POST /runtime/kilocode/cmd</text>
  <text x="510" y="241" text-anchor="middle" fill="#fde68a" font-size="9">syncRuntimeSettings</text>
  <text x="510" y="255" text-anchor="middle" fill="#fde68a" font-size="9">status: dispatched</text>

  <rect x="620" y="190" width="150" height="70" rx="6" fill="#2a1010" stroke="#ef4444" stroke-width="1.5"/>
  <text x="695" y="212" text-anchor="middle" fill="#f87171" font-weight="bold">Dispatch Failed</text>
  <text x="695" y="227" text-anchor="middle" fill="#fca5a5" font-size="9">kom.dispatch_failed event</text>
  <text x="695" y="241" text-anchor="middle" fill="#fca5a5" font-size="9">→ _PIPELINE_EVENTS</text>
  <text x="695" y="255" text-anchor="middle" fill="#fca5a5" font-size="9">status: failed</text>

  <!-- Completion row -->
  <text x="480" y="295" text-anchor="middle" fill="#64748b" font-size="11" font-weight="bold">POST /api/kom/subtask/{id}/complete — marks subtask done</text>

  <rect x="60" y="310" width="200" height="65" rx="6" fill="#1f3720" stroke="#22c55e" stroke-width="1.5"/>
  <text x="160" y="332" text-anchor="middle" fill="#4ade80" font-weight="bold">Subtask Completed</text>
  <text x="160" y="347" text-anchor="middle" fill="#86efac" font-size="9">status: done</text>
  <text x="160" y="361" text-anchor="middle" fill="#86efac" font-size="9">kom.subtask_done event emitted</text>
  <text x="160" y="375" text-anchor="middle" fill="#86efac" font-size="9">KC agent released to idle</text>

  <rect x="310" y="310" width="200" height="65" rx="6" fill="#2d1b1b" stroke="#f97316" stroke-width="1.5"/>
  <text x="410" y="332" text-anchor="middle" fill="#fb923c" font-weight="bold">All Done Check</text>
  <text x="410" y="347" text-anchor="middle" fill="#fdba74" font-size="9">all subtasks in done|completed|failed?</text>
  <text x="410" y="361" text-anchor="middle" fill="#fdba74" font-size="9">→ session.status = completed</text>
  <text x="410" y="375" text-anchor="middle" fill="#fdba74" font-size="9">kom.session_done event</text>

  <rect x="560" y="310" width="200" height="65" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="660" y="332" text-anchor="middle" fill="#60a5fa" font-weight="bold">GET /api/kom/status</text>
  <text x="660" y="347" text-anchor="middle" fill="#93c5fd" font-size="9">enabled, active_session</text>
  <text x="660" y="361" text-anchor="middle" fill="#93c5fd" font-size="9">sessions[], pipeline_events[]</text>
  <text x="660" y="375" text-anchor="middle" fill="#93c5fd" font-size="9">Displayed in KOM pane</text>

  <!-- Cancel -->
  <rect x="60" y="410" width="200" height="55" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="160" y="432" text-anchor="middle" fill="#f87171" font-weight="bold">POST /api/kom/cancel/{id}</text>
  <text x="160" y="447" text-anchor="middle" fill="#fca5a5" font-size="9">session.status = cancelled</text>
  <text x="160" y="460" text-anchor="middle" fill="#fca5a5" font-size="9">releases all KC agents</text>

  <!-- Toggle -->
  <rect x="310" y="410" width="200" height="55" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="410" y="432" text-anchor="middle" fill="#94a3b8" font-weight="bold">POST /api/kom/toggle</text>
  <text x="410" y="447" text-anchor="middle" fill="#64748b" font-size="9">enable: bool</text>
  <text x="410" y="460" text-anchor="middle" fill="#64748b" font-size="9">persists in _KOM_ENABLED</text>

  <!-- KOM Modes -->
  <rect x="20" y="490" width="920" height="100" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="480" y="511" text-anchor="middle" fill="#f8fafc" font-weight="bold" font-size="12">KOM Session Modes</text>
  <rect x="40" y="520" width="170" height="55" rx="4" fill="#1f3720" stroke="#22c55e"/>
  <text x="125" y="540" text-anchor="middle" fill="#4ade80" font-weight="bold" font-size="10">codebase_audit</text>
  <text x="125" y="555" text-anchor="middle" fill="#86efac" font-size="9">hermes_intake + zeroclaw_git</text>
  <text x="125" y="568" text-anchor="middle" fill="#86efac" font-size="9">+ kilocode_vsix subtasks</text>

  <rect x="225" y="520" width="170" height="55" rx="4" fill="#2d1b1b" stroke="#f97316"/>
  <text x="310" y="540" text-anchor="middle" fill="#fb923c" font-weight="bold" font-size="10">full_pipeline</text>
  <text x="310" y="555" text-anchor="middle" fill="#fdba74" font-size="9">hermes_fanout + zeroclaw_exec</text>
  <text x="310" y="568" text-anchor="middle" fill="#fdba74" font-size="9">+ kilocode_completion</text>

  <rect x="410" y="520" width="170" height="55" rx="4" fill="#1e1a10" stroke="#facc15"/>
  <text x="495" y="540" text-anchor="middle" fill="#facc15" font-weight="bold" font-size="10">repair</text>
  <text x="495" y="555" text-anchor="middle" fill="#fde68a" font-size="9">hermes_repair + zeroclaw_fix</text>
  <text x="495" y="568" text-anchor="middle" fill="#fde68a" font-size="9">targets broken subsystem</text>

  <rect x="595" y="520" width="170" height="55" rx="4" fill="#1e293b" stroke="#64748b"/>
  <text x="680" y="540" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="10">custom</text>
  <text x="680" y="555" text-anchor="middle" fill="#64748b" font-size="9">subtasks[] from request body</text>
  <text x="680" y="568" text-anchor="middle" fill="#64748b" font-size="9">fully user-defined</text>

  <rect x="780" y="520" width="150" height="55" rx="4" fill="#1e293b" stroke="#3b82f6"/>
  <text x="855" y="540" text-anchor="middle" fill="#60a5fa" font-weight="bold" font-size="10">Hermes Fanout</text>
  <text x="855" y="555" text-anchor="middle" fill="#93c5fd" font-size="9">POST /tasks/{id}/fanout</text>
  <text x="855" y="568" text-anchor="middle" fill="#93c5fd" font-size="9">spreads to H1-H5</text>
</svg>
