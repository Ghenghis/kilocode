<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="'Segoe UI',Arial,sans-serif" font-size="11">
  <rect width="980" height="620" fill="#0f172a"/>
  <text x="490" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#f8fafc">Hermes H1-H5 Agent Architecture + ZeroClaw Pipeline</text>
  <text x="490" y="50" text-anchor="middle" font-size="10" fill="#94a3b8">5 Discord bot containers · orchestrator.py · adapters.py</text>

  <!-- Hermes Orchestrator central -->
  <rect x="360" y="65" width="260" height="80" rx="8" fill="#2d1b1b" stroke="#f97316" stroke-width="2.5"/>
  <text x="490" y="91" text-anchor="middle" fill="#fb923c" font-weight="bold" font-size="14">HermesOrchestrator</text>
  <text x="490" y="108" text-anchor="middle" fill="#fdba74" font-size="10">orchestrator.py · port :8091</text>
  <text x="490" y="122" text-anchor="middle" fill="#fdba74" font-size="9">intake() → contract_creation() → task_fanout() → validation()</text>
  <text x="490" y="136" text-anchor="middle" fill="#fdba74" font-size="9">RepairRouter: route_repair() + execute_repair()</text>

  <!-- H1-H5 bot cards -->
  <rect x="20" y="185" width="160" height="100" rx="6" fill="#1e1b2e" stroke="#818cf8" stroke-width="2"/>
  <text x="100" y="206" text-anchor="middle" fill="#a5b4fc" font-weight="bold">H1 — Planning</text>
  <text x="100" y="222" text-anchor="middle" fill="#c7d2fe" font-size="9">Strategist · #general</text>
  <text x="100" y="237" text-anchor="middle" fill="#c7d2fe" font-size="9">port :8200</text>
  <text x="100" y="252" text-anchor="middle" fill="#c7d2fe" font-size="9">Primary orchestrator</text>
  <text x="100" y="266" text-anchor="middle" fill="#c7d2fe" font-size="9">delegate_tool, memory</text>

  <rect x="200" y="185" width="160" height="100" rx="6" fill="#1e1b2e" stroke="#818cf8" stroke-width="2"/>
  <text x="280" y="206" text-anchor="middle" fill="#a5b4fc" font-weight="bold">H2 — Creative</text>
  <text x="280" y="222" text-anchor="middle" fill="#c7d2fe" font-size="9">Brainstormer · #planning</text>
  <text x="280" y="237" text-anchor="middle" fill="#c7d2fe" font-size="9">port :8201</text>
  <text x="280" y="252" text-anchor="middle" fill="#c7d2fe" font-size="9">Code generation</text>
  <text x="280" y="266" text-anchor="middle" fill="#c7d2fe" font-size="9">file, terminal, git tools</text>

  <rect x="620" y="185" width="160" height="100" rx="6" fill="#1e1b2e" stroke="#818cf8" stroke-width="2"/>
  <text x="700" y="206" text-anchor="middle" fill="#a5b4fc" font-weight="bold">H4 — Research</text>
  <text x="700" y="222" text-anchor="middle" fill="#c7d2fe" font-size="9">Analyst · #issues</text>
  <text x="700" y="237" text-anchor="middle" fill="#c7d2fe" font-size="9">port :8203</text>
  <text x="700" y="252" text-anchor="middle" fill="#c7d2fe" font-size="9">Research + analysis</text>
  <text x="700" y="266" text-anchor="middle" fill="#c7d2fe" font-size="9">web, search tools</text>

  <rect x="800" y="185" width="160" height="100" rx="6" fill="#1e1b2e" stroke="#818cf8" stroke-width="2"/>
  <text x="880" y="206" text-anchor="middle" fill="#a5b4fc" font-weight="bold">H5 — Repair</text>
  <text x="880" y="222" text-anchor="middle" fill="#c7d2fe" font-size="9">Root Cause · #problems</text>
  <text x="880" y="237" text-anchor="middle" fill="#c7d2fe" font-size="9">port :8204</text>
  <text x="880" y="252" text-anchor="middle" fill="#c7d2fe" font-size="9">Recovery + repair</text>
  <text x="880" y="266" text-anchor="middle" fill="#c7d2fe" font-size="9">all tools + repair</text>

  <!-- H3 middle bottom -->
  <rect x="410" y="185" width="160" height="100" rx="6" fill="#1e1b2e" stroke="#818cf8" stroke-width="2.5"/>
  <text x="490" y="206" text-anchor="middle" fill="#a5b4fc" font-weight="bold">H3 — Architect</text>
  <text x="490" y="222" text-anchor="middle" fill="#c7d2fe" font-size="9">System Design · #design</text>
  <text x="490" y="237" text-anchor="middle" fill="#c7d2fe" font-size="9">port :8202</text>
  <text x="490" y="252" text-anchor="middle" fill="#c7d2fe" font-size="9">Testing + validation</text>
  <text x="490" y="266" text-anchor="middle" fill="#c7d2fe" font-size="9">execute_code, browser</text>

  <!-- Arrows Orchestrator → bots -->
  <defs>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/></marker>
  </defs>
  <line x1="410" y1="145" x2="100" y2="185" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="430" y1="145" x2="280" y2="185" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="490" y1="145" x2="490" y2="185" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="550" y1="145" x2="700" y2="185" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="570" y1="145" x2="880" y2="185" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- ZeroClaw adapters row -->
  <rect x="20" y="325" width="920" height="120" rx="6" fill="#1c1c2d" stroke="#f472b6" stroke-width="1.5"/>
  <text x="490" y="347" text-anchor="middle" fill="#f9a8d4" font-weight="bold" font-size="12">ZeroClaw Adapters (adapters.py)</text>

  <rect x="40" y="358" width="190" height="70" rx="5" fill="#22192e" stroke="#f472b6"/>
  <text x="135" y="378" text-anchor="middle" fill="#f9a8d4" font-weight="bold">GitAdapter</text>
  <text x="135" y="393" text-anchor="middle" fill="#fbcfe8" font-size="9">clone/pull/push/fetch/status</text>
  <text x="135" y="407" text-anchor="middle" fill="#fbcfe8" font-size="9">log/diff/checkout/branch</text>
  <text x="135" y="421" text-anchor="middle" fill="#fbcfe8" font-size="9">commit/add/reset/stash</text>

  <rect x="250" y="358" width="170" height="70" rx="5" fill="#22192e" stroke="#f472b6"/>
  <text x="335" y="378" text-anchor="middle" fill="#f9a8d4" font-weight="bold">ShellAdapter</text>
  <text x="335" y="393" text-anchor="middle" fill="#fbcfe8" font-size="9">run: subprocess.Popen</text>
  <text x="335" y="407" text-anchor="middle" fill="#fbcfe8" font-size="9">get_output: capture stdout</text>
  <text x="335" y="421" text-anchor="middle" fill="#fbcfe8" font-size="9">blocks: rm -rf/, fork-bomb</text>

  <rect x="435" y="358" width="190" height="70" rx="5" fill="#22192e" stroke="#f472b6"/>
  <text x="530" y="378" text-anchor="middle" fill="#f9a8d4" font-weight="bold">FilesystemAdapter</text>
  <text x="530" y="393" text-anchor="middle" fill="#fbcfe8" font-size="9">read/write/copy/move/delete</text>
  <text x="530" y="407" text-anchor="middle" fill="#fbcfe8" font-size="9">list_directory, path-jailed</text>
  <text x="530" y="421" text-anchor="middle" fill="#fbcfe8" font-size="9">blocks /etc/passwd /dev/ /sys/</text>

  <rect x="640" y="358" width="285" height="70" rx="5" fill="#22192e" stroke="#f472b6"/>
  <text x="782" y="378" text-anchor="middle" fill="#f9a8d4" font-weight="bold">ResearchAdapter</text>
  <text x="782" y="393" text-anchor="middle" fill="#fbcfe8" font-size="9">search: Tavily / web_tools fallback</text>
  <text x="782" y="407" text-anchor="middle" fill="#fbcfe8" font-size="9">extract: httpx + BeautifulSoup</text>
  <text x="782" y="421" text-anchor="middle" fill="#fbcfe8" font-size="9">summarize: LLM-backed</text>

  <!-- Skills system -->
  <rect x="20" y="465" width="440" height="120" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="240" y="487" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="12">Skills System (on VPS)</text>
  <text x="240" y="503" text-anchor="middle" fill="#64748b" font-size="10">79 bundled in /root/.hermes/skills/</text>
  <text x="240" y="518" text-anchor="middle" fill="#64748b" font-size="10">311 SKILL.md via config.yaml external_dirs</text>
  <text x="240" y="533" text-anchor="middle" fill="#64748b" font-size="10">/opt/data/skills · /opt/hermes/optional-skills</text>
  <text x="240" y="548" text-anchor="middle" fill="#64748b" font-size="10">Providers: MiniMax + SiliconFlow (api.siliconflow.cn/v1)</text>
  <text x="240" y="563" text-anchor="middle" fill="#64748b" font-size="10">Shiba Memory: db at :18789 · latency 0-2ms</text>

  <!-- Orchestrator pipeline -->
  <rect x="480" y="465" width="480" height="120" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="720" y="487" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="12">Orchestrator Pipeline Steps</text>
  <text x="500" y="506" fill="#64748b" font-size="10">1.</text><text x="515" y="506" fill="#86efac" font-size="10">intake()</text><text x="560" y="506" fill="#64748b" font-size="10">— validate goal, extract context</text>
  <text x="500" y="521" fill="#64748b" font-size="10">2.</text><text x="515" y="521" fill="#86efac" font-size="10">contract_creation()</text><text x="640" y="521" fill="#64748b" font-size="10">— build TaskPacket</text>
  <text x="500" y="536" fill="#64748b" font-size="10">3.</text><text x="515" y="536" fill="#86efac" font-size="10">task_fanout()</text><text x="595" y="536" fill="#64748b" font-size="10">— select agent, route subtask</text>
  <text x="500" y="551" fill="#64748b" font-size="10">4.</text><text x="515" y="551" fill="#86efac" font-size="10">validation()</text><text x="585" y="551" fill="#64748b" font-size="10">— criteria-check on result</text>
  <text x="500" y="566" fill="#64748b" font-size="10">5.</text><text x="515" y="566" fill="#86efac" font-size="10">RepairRouter.route_repair()</text><text x="680" y="566" fill="#64748b" font-size="10">— on failure</text>
</svg>
