<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="'Segoe UI',Arial,sans-serif" font-size="11">
  <rect width="1000" height="660" fill="#0f172a"/>
  <text x="500" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#f8fafc">Deployment Topology — VPS 187.77.30.206</text>
  <text x="500" y="50" text-anchor="middle" font-size="10" fill="#94a3b8">systemd services · Docker containers · port bindings</text>

  <!-- VPS outer box -->
