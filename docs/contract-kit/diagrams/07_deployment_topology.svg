  <rect x="250" y="130" width="200" height="55" rx="5" fill="#1f3720" stroke="#22c55e"/>
  <text x="350" y="150" text-anchor="middle" fill="#4ade80" font-weight="bold">kilocode-runtime</text>
  <text x="350" y="165" text-anchor="middle" fill="#86efac" font-size="9">src.runtime.core:app</text>
  <text x="350" y="178" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">0.0.0.0:8081</text>

  <rect x="45" y="200" width="190" height="55" rx="5" fill="#1f2d1e" stroke="#86efac"/>
  <text x="140" y="220" text-anchor="middle" fill="#86efac" font-weight="bold">kilocode-settings</text>
  <text x="140" y="235" text-anchor="middle" fill="#bbf7d0" font-size="9">src.runtime.settings_canonical:app</text>
  <text x="140" y="248" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">0.0.0.0:8082</text>

  <rect x="250" y="200" width="200" height="55" rx="5" fill="#2d1b1b" stroke="#f97316"/>
  <text x="350" y="220" text-anchor="middle" fill="#fb923c" font-weight="bold">kilocode-hermes</text>
  <text x="350" y="235" text-anchor="middle" fill="#fdba74" font-size="9">src.hermes.orchestrator:app</text>
  <text x="350" y="248" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="bold">0.0.0.0:8091</text>

  <!-- health check dependency -->
  <text x="250" y="280" text-anchor="middle" fill="#64748b" font-size="9">All services: ExecStartPre waits for kilocode-runtime :8081/health</text>
  <text x="250" y="293" text-anchor="middle" fill="#64748b" font-size="9">Restart: on-failure · WorkingDir: /opt/kilocode/contract-kit-v17</text>

  <!-- Docker containers -->
  <rect x="490" y="100" width="480" height="190" rx="6" fill="#1e1b2e" stroke="#818cf8" stroke-width="1.5"/>
  <text x="730" y="120" text-anchor="middle" fill="#a5b4fc" font-weight="bold" font-size="11">Docker Containers — Hermes Bots</text>
  <text x="730" y="135" text-anchor="middle" fill="#64748b" font-size="9">--restart unless-stopped · bridge network 172.x.x.x</text>

  <rect x="500" y="142" width="85" height="60" rx="4" fill="#1e1b2e" stroke="#818cf8"/>
  <text x="542" y="162" text-anchor="middle" fill="#a5b4fc" font-weight="bold" font-size="10">hermes1</text>
  <text x="542" y="175" text-anchor="middle" fill="#c7d2fe" font-size="9">#general</text>
  <text x="542" y="188" text-anchor="middle" fill="#818cf8" font-size="9">:8200</text>

  <rect x="595" y="142" width="85" height="60" rx="4" fill="#1e1b2e" stroke="#818cf8"/>
  <text x="637" y="162" text-anchor="middle" fill="#a5b4fc" font-weight="bold" font-size="10">hermes2</text>
  <text x="637" y="175" text-anchor="middle" fill="#c7d2fe" font-size="9">#planning</text>
  <text x="637" y="188" text-anchor="middle" fill="#818cf8" font-size="9">:8201</text>

  <rect x="690" y="142" width="85" height="60" rx="4" fill="#1e1b2e" stroke="#818cf8"/>
  <text x="732" y="162" text-anchor="middle" fill="#a5b4fc" font-weight="bold" font-size="10">hermes3</text>
  <text x="732" y="175" text-anchor="middle" fill="#c7d2fe" font-size="9">#design</text>
  <text x="732" y="188" text-anchor="middle" fill="#818cf8" font-size="9">:8202</text>

  <rect x="785" y="142" width="85" height="60" rx="4" fill="#1e1b2e" stroke="#818cf8"/>
  <text x="827" y="162" text-anchor="middle" fill="#a5b4fc" font-weight="bold" font-size="10">hermes4</text>
  <text x="827" y="175" text-anchor="middle" fill="#c7d2fe" font-size="9">#issues</text>
  <text x="827" y="188" text-anchor="middle" fill="#818cf8" font-size="9">:8203</text>

  <rect x="880" y="142" width="80" height="60" rx="4" fill="#1e1b2e" stroke="#818cf8"/>
  <text x="920" y="162" text-anchor="middle" fill="#a5b4fc" font-weight="bold" font-size="10">hermes5</text>
  <text x="920" y="175" text-anchor="middle" fill="#c7d2fe" font-size="9">#problems</text>
  <text x="920" y="188" text-anchor="middle" fill="#818cf8" font-size="9">:8204</text>

  <!-- Supporting services in docker -->
  <rect x="500" y="215" width="150" height="55" rx="4" fill="#1a1a10" stroke="#facc15"/>
  <text x="575" y="234" text-anchor="middle" fill="#facc15" font-weight="bold" font-size="10">shiba-postgres</text>
  <text x="575" y="248" text-anchor="middle" fill="#fde68a" font-size="9">restart=always</text>
  <text x="575" y="261" text-anchor="middle" fill="#fde68a" font-size="9">Memory DB :18789</text>

  <rect x="665" y="215" width="150" height="55" rx="4" fill="#1a1a10" stroke="#facc15"/>
  <text x="740" y="234" text-anchor="middle" fill="#facc15" font-weight="bold" font-size="10">shiba-gateway</text>
  <text x="740" y="248" text-anchor="middle" fill="#fde68a" font-size="9">systemd enabled</text>
  <text x="740" y="261" text-anchor="middle" fill="#fde68a" font-size="9">iptables :18789 open</text>

  <rect x="830" y="215" width="130" height="55" rx="4" fill="#1a2820" stroke="#34d399"/>
  <text x="895" y="234" text-anchor="middle" fill="#34d399" font-weight="bold" font-size="10">Ollama</text>
  <text x="895" y="248" text-anchor="middle" fill="#6ee7b7" font-size="9">systemd enabled</text>
  <text x="895" y="261" text-anchor="middle" fill="#6ee7b7" font-size="9">:11434</text>

  <!-- Shared data volumes -->
  <rect x="30" y="305" width="440" height="80" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="250" y="325" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="11">VPS Shared Volumes</text>
  <text x="50" y="345" fill="#64748b" font-size="9">/opt/data/skills</text><text x="180" y="345" fill="#94a3b8" font-size="9">— 311 SKILL.md files (shared to all H containers)</text>
  <text x="50" y="360" fill="#64748b" font-size="9">/opt/hermes/optional-skills</text><text x="220" y="360" fill="#94a3b8" font-size="9">— optional skill set</text>
  <text x="50" y="375" fill="#64748b" font-size="9">/opt/data/hermes-research/</text><text x="225" y="375" fill="#94a3b8" font-size="9">— 17 research docs per container</text>
  <text x="50" y="390" fill="#64748b" font-size="9">/opt/data/ledgers/</text><text x="175" y="390" fill="#94a3b8" font-size="9">— execution ledgers</text>

  <!-- Firewall / external -->
  <rect x="490" y="305" width="480" height="80" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="730" y="325" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="11">Network / Firewall</text>
  <text x="510" y="345" fill="#64748b" font-size="9">UFW open: 8095, 8081, 8082, 8091 (public)</text>
  <text x="510" y="360" fill="#64748b" font-size="9">UFW open: 8200-8204 (Hermes bots)</text>
  <text x="510" y="375" fill="#64748b" font-size="9">iptables: -I INPUT -s 172.0.0.0/8 -p tcp --dport 18789 -j ACCEPT (Shiba)</text>
  <text x="510" y="390" fill="#64748b" font-size="9">⚠ iptables rule NOT persistent — add to iptables-save or UFW on reboot</text>

  <!-- Deploy scripts -->
  <rect x="15" y="530" width="970" height="100" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="500" y="550" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="11">Deployment Files</text>
  <text x="50" y="570" fill="#60a5fa" font-size="10">deploy/systemd/kilocode-webui.service</text>
  <text x="50" y="585" fill="#4ade80" font-size="10">deploy/systemd/kilocode-runtime.service</text>
  <text x="50" y="600" fill="#86efac" font-size="10">deploy/systemd/kilocode-settings.service</text>
  <text x="50" y="615" fill="#fb923c" font-size="10">deploy/systemd/kilocode-hermes.service</text>
  <text x="400" y="570" fill="#64748b" font-size="10">Install: sudo cp deploy/systemd/*.service /etc/systemd/system/</text>
  <text x="400" y="585" fill="#64748b" font-size="10">Enable: sudo systemctl daemon-reload &amp;&amp; sudo systemctl enable kilocode-*.service</text>
  <text x="400" y="600" fill="#64748b" font-size="10">Start:  sudo systemctl start kilocode-runtime kilocode-settings kilocode-webui kilocode-hermes</text>
  <text x="400" y="615" fill="#64748b" font-size="10">Logs:   journalctl -u kilocode-webui -f</text>
</svg>
