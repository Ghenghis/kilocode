  <text x="500" y="88" text-anchor="middle" fill="#6b7280" font-weight="bold" font-size="12">VPS Host — Ubuntu · 187.77.30.206</text>

  <!-- systemd services -->
  <rect x="30" y="100" width="440" height="190" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="250" y="120" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="11">systemd Services (uvicorn)</text>

  <rect x="45" y="130" width="190" height="55" rx="5" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="140" y="150" text-anchor="middle" fill="#60a5fa" font-weight="bold">kilocode-webui</text>
