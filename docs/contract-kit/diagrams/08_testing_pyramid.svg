  <text x="775" y="85" text-anchor="middle" fill="#60a5fa" font-weight="bold" font-size="11">Playwright Tests (test_hub_playwright.ts)</text>
  <text x="620" y="103" fill="#93c5fd" font-size="10">✓ hub loads, sidebar nav, overview default</text>
  <text x="620" y="118" fill="#93c5fd" font-size="10">✓ providers live probe + failover buttons</text>
  <text x="620" y="133" fill="#93c5fd" font-size="10">✓ queue pipeline counters + event feed</text>
  <text x="620" y="148" fill="#93c5fd" font-size="10">✓ evidence filter, repairs timeline + trigger</text>
  <text x="620" y="163" fill="#93c5fd" font-size="10">✓ activity log load + filter + counters</text>
  <text x="620" y="178" fill="#93c5fd" font-size="10">✓ KOM toggle + session render</text>
  <text x="620" y="193" fill="#93c5fd" font-size="10">✓ agents fleet, chat, full smoke nav</text>

  <!-- Integration detail -->
  <rect x="605" y="215" width="340" height="110" rx="6" fill="#1f3720" stroke="#22c55e" stroke-width="1.5"/>
  <text x="775" y="234" text-anchor="middle" fill="#4ade80" font-weight="bold" font-size="11">Integration Suites</text>
  <text x="620" y="251" fill="#86efac" font-size="10">test_full_pipeline_integration.py</text>
  <text x="620" y="266" fill="#86efac" font-size="10">test_kilocode_hermes_integration.py</text>
  <text x="620" y="281" fill="#86efac" font-size="10">test_runtime_provider_integration.py</text>
  <text x="620" y="296" fill="#86efac" font-size="10">test_webui_agent_access_integration.py</text>
