  <rect x="605" y="340" width="340" height="110" rx="6" fill="#2d1b1b" stroke="#f97316" stroke-width="1.5"/>
  <text x="775" y="359" text-anchor="middle" fill="#fb923c" font-weight="bold" font-size="11">Unit Test Files</text>
  <text x="620" y="376" fill="#fdba74" font-size="10">test_hermes_orchestrator.py — 7 classes</text>
  <text x="620" y="391" fill="#fdba74" font-size="10">test_kilocode_runtime_sync.py</text>
