<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'Segoe UI',Arial,sans-serif" font-size="11">
  <rect width="960" height="580" fill="#0f172a"/>
  <text x="480" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#f8fafc">Testing Pyramid — Contract Kit v17</text>
  <text x="480" y="50" text-anchor="middle" font-size="10" fill="#94a3b8">tests/ · pytest · Playwright TypeScript · acceptance gates</text>

  <!-- Pyramid layers (left side) -->
  <!-- E2E / Playwright (top) -->
  <polygon points="280,75 480,75 580,150 180,150" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
