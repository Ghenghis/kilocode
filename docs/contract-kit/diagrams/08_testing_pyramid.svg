  <text x="380" y="308" text-anchor="middle" fill="#fdba74" font-size="9">tests/unit/ · hermes_orchestrator, kilocode_runtime_sync, zeroclaw_adapters, webui_control_center, proof_module</text>

  <!-- Right side detail panels -->
  <!-- E2E detail -->
