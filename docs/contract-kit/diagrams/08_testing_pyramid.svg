  <rect x="605" y="465" width="340" height="90" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="775" y="484" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="11">E2E Python Tests</text>
  <text x="620" y="501" fill="#64748b" font-size="10">test_boot_gate.py · test_hermes.py</text>
  <text x="620" y="516" fill="#64748b" font-size="10">test_kilocode.py · test_live_vps.py</text>
  <text x="620" y="531" fill="#64748b" font-size="10">test_provider_failover.py · test_runtime.py</text>
  <text x="620" y="546" fill="#64748b" font-size="10">test_settings_live.py · test_webui.py</text>

  <!-- Acceptance gates bottom -->
  <rect x="0" y="355" width="590" height="210" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="295" y="375" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="12">Acceptance Gates</text>

  <rect x="15" y="385" width="170" height="60" rx="4" fill="#1f3720" stroke="#22c55e"/>
  <text x="100" y="403" text-anchor="middle" fill="#4ade80" font-weight="bold" font-size="10">Gate 1: Syntax</text>
  <text x="100" y="418" text-anchor="middle" fill="#86efac" font-size="9">python -m py_compile src/**/*.py</text>
  <text x="100" y="432" text-anchor="middle" fill="#86efac" font-size="9">grep -r "pass  # STUB" src/ → 0</text>

  <rect x="200" y="385" width="170" height="60" rx="4" fill="#2d1b1b" stroke="#f97316"/>
  <text x="285" y="403" text-anchor="middle" fill="#fb923c" font-weight="bold" font-size="10">Gate 2: Unit Tests</text>
  <text x="285" y="418" text-anchor="middle" fill="#fdba74" font-size="9">pytest tests/unit/ -v</text>
  <text x="285" y="432" text-anchor="middle" fill="#fdba74" font-size="9">100% pass required</text>

  <rect x="385" y="385" width="185" height="60" rx="4" fill="#1e1a10" stroke="#facc15"/>
  <text x="477" y="403" text-anchor="middle" fill="#facc15" font-weight="bold" font-size="10">Gate 3: Integration</text>
  <text x="477" y="418" text-anchor="middle" fill="#fde68a" font-size="9">pytest tests/integration/ -v</text>
  <text x="477" y="432" text-anchor="middle" fill="#fde68a" font-size="9">pytest tests/e2e/ -v</text>

  <rect x="15" y="460" width="170" height="60" rx="4" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="100" y="478" text-anchor="middle" fill="#60a5fa" font-weight="bold" font-size="10">Gate 4: Coverage</text>
  <text x="100" y="493" text-anchor="middle" fill="#93c5fd" font-size="9">pytest --cov=src</text>
  <text x="100" y="507" text-anchor="middle" fill="#93c5fd" font-size="9">--cov-fail-under=80</text>

  <rect x="200" y="460" width="170" height="60" rx="4" fill="#1a1620" stroke="#a78bfa"/>
  <text x="285" y="478" text-anchor="middle" fill="#c4b5fd" font-weight="bold" font-size="10">Gate 5: Playwright</text>
  <text x="285" y="493" text-anchor="middle" fill="#ddd6fe" font-size="9">npx playwright test</text>
  <text x="285" y="507" text-anchor="middle" fill="#ddd6fe" font-size="9">tests/e2e/test_hub_playwright.ts</text>

  <rect x="385" y="460" width="185" height="60" rx="4" fill="#1e293b" stroke="#64748b"/>
  <text x="477" y="478" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="10">Gate 6: VPS Live</text>
  <text x="477" y="493" text-anchor="middle" fill="#64748b" font-size="9">pytest tests/e2e/test_live_vps.py</text>
  <text x="477" y="507" text-anchor="middle" fill="#64748b" font-size="9">curl 187.77.30.206:8095/health</text>

  <!-- run commands -->
  <text x="295" y="540" text-anchor="middle" fill="#475569" font-size="9">Run all: pytest tests/ -v --cov=src --cov-fail-under=80 &amp;&amp; npx playwright test</text>
  <text x="295" y="555" text-anchor="middle" fill="#475569" font-size="9">Config: playwright.config.ts · conftest.py · conftest_blockchain.py</text>
</svg>
