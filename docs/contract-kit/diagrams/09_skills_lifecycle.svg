<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI',Arial,sans-serif" font-size="12">
  <defs>
    <marker id="arr-grn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="1100" height="720" fill="#0f172a"/>

  <text x="550" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#f8fafc">Skills System — Audit, Verdict &amp; Execution Pipeline</text>
  <text x="550" y="52" text-anchor="middle" font-size="11" fill="#94a3b8">5 enforced rules · 4 verdict states · ZeroClaw-mediated execution · Voyager learn loop</text>

  <!-- Stage 1: Install -->
  <rect x="40" y="90" width="200" height="90" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" fill="#60a5fa" font-weight="bold" font-size="13">1 · INSTALL</text>
  <text x="140" y="135" text-anchor="middle" fill="#cbd5e1" font-size="11">POST /api/skills/install</text>
  <text x="140" y="152" text-anchor="middle" fill="#94a3b8" font-size="10">Manifest required</text>
  <text x="140" y="167" text-anchor="middle" fill="#94a3b8" font-size="10">JSON-Schema validation</text>

  <!-- Stage 2: Audit -->
  <rect x="290" y="90" width="200" height="90" rx="8" fill="#3a2c1f" stroke="#f59e0b" stroke-width="2"/>
  <text x="390" y="115" text-anchor="middle" fill="#fbbf24" font-weight="bold" font-size="13">2 · AUDIT</text>
  <text x="390" y="135" text-anchor="middle" fill="#fde68a" font-size="11">run_skill_audit()</text>
  <text x="390" y="152" text-anchor="middle" fill="#fcd34d" font-size="10">5 rules enforced</text>
  <text x="390" y="167" text-anchor="middle" fill="#fcd34d" font-size="10">QUARANTINE_KEYWORDS</text>

  <!-- Stage 3: Verdict (with sub-boxes) -->
  <rect x="540" y="80" width="280" height="270" rx="8" fill="#1f2937" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="680" y="100" text-anchor="middle" fill="#e2e8f0" font-weight="bold" font-size="13">3 · VERDICT</text>

  <rect x="555" y="115" width="250" height="48" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="136" text-anchor="middle" fill="#86efac" font-weight="bold" font-size="12">PASS</text>
  <text x="680" y="152" text-anchor="middle" fill="#bbf7d0" font-size="10">auto-runnable, approved=true</text>

  <rect x="555" y="170" width="250" height="48" rx="6" fill="#3a2c1f" stroke="#f59e0b" stroke-width="2"/>
  <text x="680" y="191" text-anchor="middle" fill="#fbbf24" font-weight="bold" font-size="12">PASS_REQUIRES_APPROVAL</text>
  <text x="680" y="207" text-anchor="middle" fill="#fde68a" font-size="10">dangerous=true, approved=false</text>

  <rect x="555" y="225" width="250" height="48" rx="6" fill="#3f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="680" y="246" text-anchor="middle" fill="#fca5a5" font-weight="bold" font-size="12">FAIL</text>
  <text x="680" y="262" text-anchor="middle" fill="#fecaca" font-size="10">manifest invalid · refused</text>

  <rect x="555" y="280" width="250" height="48" rx="6" fill="#3f1d1d" stroke="#ef4444" stroke-width="2.5"/>
  <text x="680" y="301" text-anchor="middle" fill="#fca5a5" font-weight="bold" font-size="12">QUARANTINE</text>
  <text x="680" y="317" text-anchor="middle" fill="#fecaca" font-size="10">obliterat / jailbreak / bypass</text>

  <!-- Stage 4: Execute -->
  <rect x="870" y="115" width="200" height="100" rx="8" fill="#3b1e5f" stroke="#a855f7" stroke-width="2"/>
  <text x="970" y="140" text-anchor="middle" fill="#c084fc" font-weight="bold" font-size="13">4 · EXECUTE</text>
  <text x="970" y="160" text-anchor="middle" fill="#e9d5ff" font-size="11">POST /skills/{id}/execute</text>
  <text x="970" y="178" text-anchor="middle" fill="#d8b4fe" font-size="10">→ ZeroClaw safe-exec</text>
  <text x="970" y="194" text-anchor="middle" fill="#d8b4fe" font-size="10">runtime + node + python</text>
  <text x="970" y="210" text-anchor="middle" fill="#d8b4fe" font-size="10">browser executors</text>

  <!-- Stage 5: Evidence -->
  <rect x="870" y="235" width="200" height="90" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="970" y="260" text-anchor="middle" fill="#86efac" font-weight="bold" font-size="13">5 · EVIDENCE</text>
  <text x="970" y="280" text-anchor="middle" fill="#bbf7d0" font-size="11">write_evidence()</text>
  <text x="970" y="297" text-anchor="middle" fill="#bbf7d0" font-size="10">evidence/&lt;id&gt;/&lt;run&gt;.json</text>
  <text x="970" y="312" text-anchor="middle" fill="#bbf7d0" font-size="10">logs/&lt;id&gt;.jsonl</text>

  <!-- Arrows: Install -> Audit -->
  <line x1="240" y1="135" x2="288" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Arrows: Audit -> Verdict box -->
  <line x1="490" y1="135" x2="538" y2="135" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-amber)"/>

  <!-- Arrows: Verdict states -> Execute -->
  <line x1="805" y1="139" x2="868" y2="155" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-grn)"/>
  <line x1="805" y1="194" x2="868" y2="180" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-amber)"/>
  <text x="845" y="148" fill="#86efac" font-size="9" font-weight="bold">PASS</text>
  <text x="820" y="200" fill="#fbbf24" font-size="9">approved=true</text>

  <!-- FAIL/QUARANTINE blocked -->
  <line x1="805" y1="249" x2="845" y2="265" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="858" y="262" fill="#fca5a5" font-size="9" font-weight="bold">403</text>
  <line x1="805" y1="304" x2="845" y2="290" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="858" y="287" fill="#fca5a5" font-size="9" font-weight="bold">refused</text>

  <!-- Execute -> Evidence -->
  <line x1="970" y1="215" x2="970" y2="233" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-grn)"/>

  <!-- Voyager learn loop -->
  <rect x="40" y="420" width="320" height="100" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="200" y="445" text-anchor="middle" fill="#c084fc" font-weight="bold" font-size="13">VOYAGER LEARN LOOP</text>
  <text x="200" y="465" text-anchor="middle" fill="#e9d5ff" font-size="11">POST /api/skills/learn</text>
  <text x="200" y="482" text-anchor="middle" fill="#d8b4fe" font-size="10">{trigger, proposed_manifest, feedback}</text>
  <text x="200" y="498" text-anchor="middle" fill="#d8b4fe" font-size="10">→ audit → register UN-APPROVED</text>
  <text x="200" y="513" text-anchor="middle" fill="#fbbf24" font-size="10">human review required</text>

  <!-- Voyager arrow back to Install -->
  <line x1="200" y1="420" x2="200" y2="200" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
  <text x="210" y="320" fill="#c084fc" font-size="10">re-audit</text>

  <!-- Permissions -->
  <rect x="400" y="420" width="320" height="100" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="560" y="445" text-anchor="middle" fill="#60a5fa" font-weight="bold" font-size="13">PERMISSIONS</text>
  <text x="560" y="465" text-anchor="middle" fill="#93c5fd" font-size="11">PUT /api/skills/{id}/permissions</text>
  <text x="560" y="482" text-anchor="middle" fill="#cbd5e1" font-size="10">fs_read · fs_write · shell · git_push</text>
  <text x="560" y="498" text-anchor="middle" fill="#cbd5e1" font-size="10">network_get · network_post · browser</text>
  <text x="560" y="513" text-anchor="middle" fill="#cbd5e1" font-size="10">memory_read · memory_write</text>

  <!-- Storage layout -->
  <rect x="760" y="420" width="310" height="180" rx="8" fill="#1f2937" stroke="#475569" stroke-width="1.5"/>
  <text x="915" y="445" text-anchor="middle" fill="#e2e8f0" font-weight="bold" font-size="13">STORAGE</text>
  <text x="775" y="468" fill="#94a3b8" font-size="10" font-family="'Cascadia Code',monospace">~/daveai/skills/</text>
  <text x="785" y="485" fill="#cbd5e1" font-size="10" font-family="'Cascadia Code',monospace">├── registry.json</text>
  <text x="785" y="500" fill="#cbd5e1" font-size="10" font-family="'Cascadia Code',monospace">├── manifest.schema.json</text>
  <text x="785" y="515" fill="#cbd5e1" font-size="10" font-family="'Cascadia Code',monospace">├── audits/&lt;id&gt;.json</text>
  <text x="785" y="530" fill="#cbd5e1" font-size="10" font-family="'Cascadia Code',monospace">├── evidence/&lt;id&gt;/&lt;run&gt;.json</text>
  <text x="785" y="545" fill="#cbd5e1" font-size="10" font-family="'Cascadia Code',monospace">├── logs/&lt;id&gt;.jsonl</text>
  <text x="785" y="560" fill="#cbd5e1" font-size="10" font-family="'Cascadia Code',monospace">└── quarantine/*.reason.txt</text>
  <text x="775" y="585" fill="#94a3b8" font-size="10">Provisioned via skills/install_vps_skills.sh</text>

  <!-- Footer: rule list -->
  <text x="40" y="635" fill="#e2e8f0" font-weight="bold" font-size="12">Five Enforced Rules (verified by V80_skills_audit_truth):</text>
  <text x="40" y="655" fill="#cbd5e1" font-size="11">① No skill runs without manifest    ② No skill runs without permission profile    ③ Dangerous skills require explicit approval</text>
  <text x="40" y="673" fill="#cbd5e1" font-size="11">④ All skills must pass audit before active    ⑤ Every execution writes evidence JSON</text>
  <text x="40" y="697" fill="#94a3b8" font-size="10">Source: src/webui/hub/routers/skills.py · seeded by skills/registry.seed.json (6 skills, 1 quarantined: obliteratus)</text>
</svg>
