<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="circuit" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 20h15M25 20h15M20 0v15M20 25v15" stroke="#6366f1" stroke-width="1" fill="none" opacity="0.3"/>
      <circle cx="20" cy="20" r="2" fill="#6366f1" opacity="0.5"/>
      <circle cx="5" cy="20" r="1.5" fill="#22d3ee" opacity="0.4"/>
      <circle cx="35" cy="20" r="1.5" fill="#22d3ee" opacity="0.4"/>
      <circle cx="20" cy="5" r="1.5" fill="#f472b6" opacity="0.4"/>
      <circle cx="20" cy="35" r="1.5" fill="#f472b6" opacity="0.4"/>
    </pattern>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f472b6"/>
    </marker>
  </defs>
  
  <rect width="1200" height="200" fill="url(#bgGradient)"/>
  <rect width="1200" height="200" fill="url(#circuit)"/>
  
  <rect x="10" y="10" width="1180" height="180" rx="12" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <rect x="15" y="15" width="1170" height="170" rx="10" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  
  <g filter="url(#glow)">
    <text x="600" y="95" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Contract Kit v17
    </text>
    <text x="600" y="135" font-family="Arial, sans-serif" font-size="20" fill="#22d3ee" text-anchor="middle" letter-spacing="8">
      INTELLIGENT CONTRACT AUTOMATION
    </text>
  </g>
  
  <g opacity="0.7">
    <circle cx="100" cy="50" r="8" fill="#6366f1">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="80" r="5" fill="#22d3ee">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="120" r="6" fill="#f472b6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="60" r="7" fill="#22d3ee">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="100" r="5" fill="#6366f1">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1120" cy="140" r="6" fill="#f472b6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.9s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <path d="M50 160 L200 160 L250 180 L400 180" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowCyan)" opacity="0.5"/>
  <path d="M1150 160 L1000 160 L950 180 L800 180" stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrowPink)" opacity="0.5"/>
</svg>