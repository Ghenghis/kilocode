<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSmall" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#10b981"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#ef4444"/>
    </marker>
    <linearGradient id="laneBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="lanePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="laneGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="laneAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="laneRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <rect width="1400" height="900" fill="#0f172a"/>
  
  <text x="700" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Five-Lane Architecture</text>
  
  <!-- Lane 1: WebUI (top left) - Blue -->
  <g filter="url(#shadow)">
    <rect x="30" y="55" width="400" height="180" rx="12" fill="url(#laneBlue)" stroke="#3b82f6" stroke-width="2"/>
    <rect x="30" y="55" width="400" height="35" rx="12" fill="#3b82f6"/>
    <rect x="30" y="75" width="400" height="15" fill="#3b82f6"/>
    <text x="230" y="78" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Lane 1: WebUI</text>
    
    <g font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">
      <text x="50" y="115">Control Center</text>
      <text x="50" y="140">Providers</text>
      <text x="50" y="165">Agents</text>
      <text x="220" y="115">Workflows</text>
      <text x="220" y="140">Evidence/DevTools</text>
      <text x="220" y="165">Repairs</text>
      <text x="50" y="210">Settings</text>
    </g>
  </g>
  
  <!-- Lane 2: KiloCode (top right) - Purple -->
  <g filter="url(#shadow)">
    <rect x="970" y="55" width="400" height="180" rx="12" fill="url(#lanePurple)" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="970" y="55" width="400" height="35" rx="12" fill="#8b5cf6"/>
    <rect x="970" y="75" width="400" height="15" fill="#8b5cf6"/>
    <text x="1170" y="78" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Lane 2: KiloCode</text>
    
    <g font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">
      <text x="990" y="115">Runtime Sync</text>
      <text x="990" y="140">Active Task Panel</text>
      <text x="990" y="165">Completion Submitter</text>
      <text x="990" y="190">Provider Status</text>
      <text x="990" y="215">Evidence Return</text>
    </g>
  </g>
  
  <!-- Lane 3: Runtime + Provider (middle center) - Green -->
  <g filter="url(#shadow)">
    <rect x="400" y="260" width="600" height="180" rx="12" fill="url(#laneGreen)" stroke="#10b981" stroke-width="2"/>
    <rect x="400" y="260" width="600" height="35" rx="12" fill="#10b981"/>
    <rect x="400" y="280" width="600" height="15" fill="#10b981"/>
    <text x="700" y="283" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Lane 3: Runtime + Provider</text>
    
    <g font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">
      <text x="420" y="325">Canonical Settings</text>
      <text x="420" y="355">Event Bus</text>
      <text x="420" y="385">Provider Router</text>
      <text x="700" y="325">Question Flow</text>
      <text x="700" y="355">Mode Enforcement</text>
    </g>
  </g>
  
  <!-- Lane 4: Hermes + ZeroClaw (bottom left) - Amber -->
  <g filter="url(#shadow)">
    <rect x="30" y="470" width="400" height="220" rx="12" fill="url(#laneAmber)" stroke="#f59e0b" stroke-width="2"/>
    <rect x="30" y="470" width="400" height="35" rx="12" fill="#f59e0b"/>
    <rect x="30" y="490" width="400" height="15" fill="#f59e0b"/>
    <text x="230" y="493" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Lane 4: Hermes + ZeroClaw</text>
    
    <g font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">
      <text x="50" y="530">Intake</text>
      <text x="50" y="560">Contract Creation</text>
      <text x="50" y="590">Task Fan-Out</text>
      <text x="50" y="620">Validation</text>
      <text x="220" y="530">Repair Routing</text>
      <text x="220" y="560">ZeroClaw Adapters</text>
    </g>
  </g>
  
  <!-- Lane 5: Proof / Testing (bottom right) - Red -->
  <g filter="url(#shadow)">
    <rect x="970" y="470" width="400" height="220" rx="12" fill="url(#laneRed)" stroke="#ef4444" stroke-width="2"/>
    <rect x="970" y="470" width="400" height="35" rx="12" fill="#ef4444"/>
    <rect x="970" y="490" width="400" height="15" fill="#ef4444"/>
    <text x="1170" y="493" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Lane 5: Proof / Testing</text>
    
    <g font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">
      <text x="990" y="530">Playwright UI</text>
      <text x="990" y="560">Boot-Gate Tests</text>
      <text x="990" y="590">Failover Tests</text>
      <text x="990" y="620">Autofill Tests</text>
      <text x="990" y="650">Repair Tests</text>
    </g>
  </g>
  
  <!-- Data Flow Arrows -->
  <!-- Lane 1 to Lane 3 -->
  <path d="M230 235 L230 260" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M350 235 L350 260" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  
  <!-- Lane 2 to Lane 3 -->
  <path d="M1170 235 L1170 260" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <path d="M1050 235 L1050 260" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  
  <!-- Lane 3 to Lane 4 -->
  <path d="M400 440 L400 470" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M300 440 L300 470" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  
  <!-- Lane 3 to Lane 5 -->
  <path d="M1000 440 L1000 470" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M1100 440 L1100 470" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  
  <!-- Bidirectional arrows between lanes -->
  <path d="M430 260 L400 295" stroke="#10b981" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <path d="M970 260 L1000 295" stroke="#10b981" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  
  <!-- Lane 4 to Lane 5 (bottom) -->
  <path d="M430 690 L970 690" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowAmber)"/>
  <path d="M430 700 L970 700" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  
  <!-- Legend -->
  <g transform="translate(550, 780)">
    <rect x="0" y="0" width="300" height="100" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Data Flow Legend</text>
    <line x1="20" y1="50" x2="60" y2="50" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="75" y="54" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Lane 1 → 3</text>
    <line x1="20" y1="75" x2="60" y2="75" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <text x="75" y="79" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Lane 2 → 3</text>
    <line x1="160" y1="50" x2="200" y2="50" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="215" y="54" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Lane 3 → 4/5</text>
    <line x1="160" y1="75" x2="200" y2="75" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
    <text x="215" y="79" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Bidirectional</text>
  </g>
</svg>