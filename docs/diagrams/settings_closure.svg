<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSmall" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowIndigo" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#10b981"/>
    </marker>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L10,6 z" fill="#22d3ee"/>
    </marker>
  </defs>
  
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Settings Closure Architecture</text>
  
  <!-- Runtime Canonical Settings (Center, Largest) -->
  <g filter="url(#shadow)">
    <rect x="400" y="220" width="400" height="180" rx="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="3"/>
    <rect x="400" y="220" width="400" height="45" rx="16" fill="#6366f1"/>
    <rect x="400" y="250" width="400" height="15" fill="#6366f1"/>
    <text x="600" y="250" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Runtime Canonical Settings</text>
    <g font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">
      <text x="420" y="295">Provider Configurations</text>
      <text x="420" y="320">Mode Policies</text>
      <text x="420" y="345">Token Budgets</text>
      <text x="620" y="295">Fallback Chains</text>
      <text x="620" y="320">Health Thresholds</text>
      <text x="620" y="345">Validation Rules</text>
    </g>
  </g>
  
  <!-- Open WebUI (top-left) -->
  <g filter="url(#shadowSmall)">
    <rect x="60" y="80" width="220" height="100" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
    <rect x="60" y="80" width="220" height="35" rx="12" fill="#3b82f6"/>
    <rect x="60" y="100" width="220" height="15" fill="#3b82f6"/>
    <text x="170" y="103" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Open WebUI</text>
    <text x="170" y="145" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Configuration Panel</text>
    <text x="170" y="165" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Manual Settings</text>
  </g>
  
  <!-- KiloCode/VSIX (top-right) -->
  <g filter="url(#shadowSmall)">
    <rect x="920" y="80" width="220" height="100" rx="12" fill="#2d1f5e" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="920" y="80" width="220" height="35" rx="12" fill="#8b5cf6"/>
    <rect x="920" y="100" width="220" height="15" fill="#8b5cf6"/>
    <text x="1030" y="103" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">KiloCode / VSIX</text>
    <text x="1030" y="145" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Runtime Sync</text>
    <text x="1030" y="165" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Task Context</text>
  </g>
  
  <!-- Hermes (bottom-left) -->
  <g filter="url(#shadowSmall)">
    <rect x="60" y="480" width="220" height="100" rx="12" fill="#3d2a0a" stroke="#f59e0b" stroke-width="2"/>
    <rect x="60" y="480" width="220" height="35" rx="12" fill="#f59e0b"/>
    <rect x="60" y="500" width="220" height="15" fill="#f59e0b"/>
    <text x="170" y="503" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Hermes Agent</text>
    <text x="170" y="545" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Intake Processing</text>
    <text x="170" y="565" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Contract Creation</text>
  </g>
  
  <!-- ZeroClaw (bottom-right) -->
  <g filter="url(#shadowSmall)">
    <rect x="920" y="480" width="220" height="100" rx="12" fill="#0f3d2e" stroke="#10b981" stroke-width="2"/>
    <rect x="920" y="480" width="220" height="35" rx="12" fill="#10b981"/>
    <rect x="920" y="500" width="220" height="15" fill="#10b981"/>
    <text x="1030" y="503" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">ZeroClaw</text>
    <text x="1030" y="545" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Execution Engine</text>
    <text x="1030" y="565" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Provider Routing</text>
  </g>
  
  <!-- Missing Settings Question Arrows (outgoing) -->
  <!-- WebUI -> Runtime -->
  <path d="M170 180 L170 220" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="185" y="200" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6">query</text>
  
  <!-- KiloCode -> Runtime -->
  <path d="M1030 180 L1030 220" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="1045" y="200" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6">query</text>
  
  <!-- Hermes -> Runtime -->
  <path d="M170 480 L170 400" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowAmber)"/>
  <text x="185" y="440" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">query</text>
  
  <!-- ZeroClaw -> Runtime -->
  <path d="M1030 480 L1030 400" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="1045" y="440" font-family="Arial, sans-serif" font-size="9" fill="#10b981">query</text>
  
  <!-- Autofill Return Arrows -->
  <!-- Runtime -> WebUI -->
  <path d="M400 310 L280 310 L280 180" stroke="#22d3ee" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowCyan)"/>
  <text x="310" y="250" font-family="Arial, sans-serif" font-size="9" fill="#22d3ee">autofill</text>
  
  <!-- Runtime -> KiloCode -->
  <path d="M800 310 L920 310 L920 180" stroke="#22d3ee" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowCyan)"/>
  <text x="870" y="250" font-family="Arial, sans-serif" font-size="9" fill="#22d3ee">autofill</text>
  
  <!-- Runtime -> Hermes -->
  <path d="M400 310 L280 310 L280 480" stroke="#22d3ee" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowCyan)"/>
  <text x="310" y="400" font-family="Arial, sans-serif" font-size="9" fill="#22d3ee">autofill</text>
  
  <!-- Runtime -> ZeroClaw -->
  <path d="M800 310 L920 310 L920 480" stroke="#22d3ee" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowCyan)"/>
  <text x="870" y="400" font-family="Arial, sans-serif" font-size="9" fill="#22d3ee">autofill</text>
  
  <!-- Missing Settings Question Labels -->
  <g transform="translate(40, 200)">
    <rect x="0" y="0" width="100" height="60" rx="6" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6366f1" text-anchor="middle">Missing Settings</text>
    <text x="50" y="42" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6366f1" text-anchor="middle">Question</text>
    <text x="50" y="56" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(bidirectional)</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(480, 600)">
    <rect x="0" y="0" width="240" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="120" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Flow Types</text>
    <line x1="15" y1="40" x2="55" y2="40" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="65" y="44" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Query</text>
    <line x1="15" y1="60" x2="55" y2="60" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowCyan)"/>
    <text x="65" y="64" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Autofill Return</text>
    <rect x="130" y="32" width="20" height="14" rx="3" fill="#6366f1"/>
    <text x="158" y="44" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Runtime (Center)</text>
  </g>
  
  <!-- Flow annotations -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Components query Runtime for missing settings; Runtime autofills defaults and caches configurations</text>
</svg>