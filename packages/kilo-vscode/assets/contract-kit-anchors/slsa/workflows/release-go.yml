# SLSA L3 Release Workflow — Go
#
# Builds a Go binary, signs with cosign keyless OIDC, generates SLSA L3
# in-toto provenance via the canonical generic generator workflow.
# (Note: slsa-github-generator also ships a Go-specific workflow at
#  generator_go_slsa3.yml; this template uses the generic workflow for
#  uniformity across Anchor 6 templates.)
# SLSA spec:    https://slsa.dev/spec/v1.0/
# in-toto v1.0: https://github.com/in-toto/attestation/tree/main/spec

name: release-go

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      digest: ${{ steps.hash.outputs.digest }}
      artifact: ${{ steps.pack.outputs.artifact }}
    steps:
      # actions/checkout@v4.1.7  (2024-07-23)
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      # actions/setup-go@v5.0.2  (2024-07-22)
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: "1.22"
          cache: true

      - name: Build release binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          set -euo pipefail
          BIN=$(basename "$(go list -m)")
          mkdir -p dist-release
          go build -trimpath -ldflags="-s -w" -o "dist-release/${BIN}" ./...
          tar -C dist-release -czf "dist-release/${BIN}-${GITHUB_REF_NAME}-linux-amd64.tar.gz" "${BIN}"
          rm -f "dist-release/${BIN}"

      - name: Pack tarball reference
        id: pack
        run: |
          set -euo pipefail
          ART=$(ls dist-release/*.tar.gz | head -n1)
          echo "artifact=${ART}" >> "$GITHUB_OUTPUT"

      - name: Compute sha256 digest
        id: hash
        run: |
          set -euo pipefail
          DIGEST=$(sha256sum "${{ steps.pack.outputs.artifact }}" | base64 -w0)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # actions/upload-artifact@v4.3.6  (2024-08-05)
      - uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a
        with:
          name: go-release
          path: dist-release/
          if-no-files-found: error
          retention-days: 7

  provenance:
    needs: [build]
    permissions:
      id-token: write
      contents: write
      actions: read
    # slsa-framework/slsa-github-generator v2.0.0  (2024-06-26)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563
    with:
      base64-subjects: ${{ needs.build.outputs.digest }}
      upload-assets: true
      provenance-name: provenance.intoto.jsonl

  publish:
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      # actions/download-artifact@v4.1.8  (2024-09-09)
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: go-release
          path: dist-release

      # sigstore/cosign-installer@v3.6.0  (2024-08-29)
      - uses: sigstore/cosign-installer@4959ce089c2fe283b1654b3d70d8cd4a4e8f96e5
        with:
          cosign-release: "v2.4.0"

      - name: Sign artifact (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          for f in dist-release/*.tar.gz; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "${f}"
          done

      # softprops/action-gh-release@v2.0.8  (2024-08-25)
      - uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          files: |
            dist-release/*.tar.gz
            dist-release/*.sig
            dist-release/*.pem
          fail_on_unmatched_files: true
