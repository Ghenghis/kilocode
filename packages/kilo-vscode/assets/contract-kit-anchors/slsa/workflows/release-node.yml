# SLSA L3 Release Workflow — Node.js
#
# Produces a tarball release artifact, generates a SLSA L3 in-toto
# provenance attestation, and signs the artifact with cosign keyless
# (Sigstore OIDC). Conforms to SLSA v1.0 spec:
#   https://slsa.dev/spec/v1.0/
# In-toto attestation v1.0:
#   https://github.com/in-toto/attestation/tree/main/spec
#
# All third-party actions pinned by full commit SHA (NOT floating tags)
# per OpenSSF Scorecard "Pinned-Dependencies" check.

name: release-node

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  # 1. Build the tarball and emit its sha256 digest.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      digest: ${{ steps.hash.outputs.digest }}
      artifact: ${{ steps.pack.outputs.artifact }}
    steps:
      # actions/checkout@v4.1.7  (2024-07-23)
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      # actions/setup-node@v4.0.3  (2024-07-22)
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Pack tarball
        id: pack
        run: |
          npm pack --pack-destination dist-release
          ARTIFACT=$(ls dist-release/*.tgz | head -n1)
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Compute sha256 digest
        id: hash
        run: |
          set -euo pipefail
          DIGEST=$(sha256sum "${{ steps.pack.outputs.artifact }}" | base64 -w0)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # actions/upload-artifact@v4.3.6  (2024-08-05)
      - uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a
        with:
          name: release-tarball
          path: ${{ steps.pack.outputs.artifact }}
          if-no-files-found: error
          retention-days: 7

  # 2. Generate the SLSA L3 provenance attestation. Reusable workflow
  #    pinned to release commit SHA (v2.0.0).
  provenance:
    needs: [build]
    permissions:
      id-token: write   # OIDC token for keyless signing
      contents: write   # Attach attestation to GitHub Release
      actions: read     # Read workflow run metadata
    # slsa-framework/slsa-github-generator v2.0.0  (2024-06-26)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563
    with:
      base64-subjects: ${{ needs.build.outputs.digest }}
      upload-assets: true
      provenance-name: provenance.intoto.jsonl

  # 3. Cosign keyless-sign the artifact + publish to GitHub Release.
  publish:
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      # actions/checkout@v4.1.7  (2024-07-23)
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      # actions/upload-artifact / download-artifact  v4.1.8  (2024-09-09)
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: release-tarball
          path: dist-release

      # sigstore/cosign-installer@v3.6.0  (2024-08-29)
      - uses: sigstore/cosign-installer@4959ce089c2fe283b1654b3d70d8cd4a4e8f96e5
        with:
          cosign-release: "v2.4.0"

      - name: Sign artifact (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          ART=$(ls dist-release/*.tgz | head -n1)
          cosign sign-blob --yes \
            --output-signature "${ART}.sig" \
            --output-certificate "${ART}.pem" \
            "${ART}"

      # softprops/action-gh-release@v2.0.8  (2024-08-25)
      - uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          files: |
            dist-release/*.tgz
            dist-release/*.tgz.sig
            dist-release/*.tgz.pem
          fail_on_unmatched_files: true
