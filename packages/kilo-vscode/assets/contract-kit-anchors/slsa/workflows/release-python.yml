# SLSA L3 Release Workflow — Python
#
# Builds a sdist+wheel, signs with cosign keyless OIDC, generates SLSA L3
# in-toto provenance via the canonical Python generator workflow.
# SLSA spec:    https://slsa.dev/spec/v1.0/
# in-toto v1.0: https://github.com/in-toto/attestation/tree/main/spec

name: release-python

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      digest: ${{ steps.hash.outputs.digest }}
    steps:
      # actions/checkout@v4.1.7  (2024-07-23)
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      # actions/setup-python@v5.1.1  (2024-07-23)
      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.2.1

      - name: Build sdist + wheel
        run: python -m build --outdir dist

      - name: Compute sha256 digest of all artifacts
        id: hash
        run: |
          set -euo pipefail
          DIGEST=$(cd dist && sha256sum *.tar.gz *.whl | base64 -w0)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # actions/upload-artifact@v4.3.6  (2024-08-05)
      - uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a
        with:
          name: python-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  provenance:
    needs: [build]
    permissions:
      id-token: write
      contents: write
      actions: read
    # slsa-framework/slsa-github-generator v2.0.0  (2024-06-26)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563
    with:
      base64-subjects: ${{ needs.build.outputs.digest }}
      upload-assets: true
      provenance-name: provenance.intoto.jsonl

  publish:
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      # actions/download-artifact@v4.1.8  (2024-09-09)
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: python-dist
          path: dist

      # sigstore/cosign-installer@v3.6.0  (2024-08-29)
      - uses: sigstore/cosign-installer@4959ce089c2fe283b1654b3d70d8cd4a4e8f96e5
        with:
          cosign-release: "v2.4.0"

      - name: Sign artifacts (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          for f in dist/*.tar.gz dist/*.whl; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "${f}"
          done

      # softprops/action-gh-release@v2.0.8  (2024-08-25)
      - uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.sig
            dist/*.pem
          fail_on_unmatched_files: true
